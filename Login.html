<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - SehatSathi AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      background: #052818;
      overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 85% 10%, rgba(134,239,172,0.40) 0%, transparent 58%),
        radial-gradient(ellipse 60% 70% at 12% 88%, rgba(21,128,61,0.55) 0%, transparent 58%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #064e2b 0%, #052818 100%);
      z-index: 0;
    }
    .shape { position: fixed; border: 1.5px solid rgba(255,255,255,0.10); border-radius: 8px; pointer-events: none; z-index: 0; }
    .s1 { width: 92px; height: 92px; top: 11%; left: 6%; transform: rotate(17deg); animation: fl1 9s ease-in-out infinite; }
    .s2 { width: 54px; height: 54px; bottom: 20%; left: 7%; transform: rotate(34deg); animation: fl2 12s ease-in-out infinite; }
    .s3 { width: 68px; height: 68px; top: 62%; right: 5%; border-radius: 50%; animation: fl1 8s ease-in-out infinite; }
    .s4 { width: 44px; height: 44px; top: 20%; right: 8%; transform: rotate(-22deg); animation: fl2 10s ease-in-out infinite; }
    @keyframes fl1 { 0%,100%{transform:rotate(17deg) translateY(0)} 50%{transform:rotate(17deg) translateY(-18px)} }
    @keyframes fl2 { 0%,100%{transform:rotate(34deg) translateY(0)} 50%{transform:rotate(34deg) translateY(15px)} }

    /* NAVBAR */
    .navbar {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 32px; margin: 16px 20px 0;
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,0.20);
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.3rem; font-weight: 800; color: #fff; text-decoration: none;
    }
    .brand-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #22c55e, #86efac);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      box-shadow: 0 4px 14px rgba(34,197,94,0.4);
    }
    .btn-nav {
      padding: 10px 26px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 12px; color: #fff;
      font-family: 'Outfit', sans-serif; font-size: 0.93rem; font-weight: 600;
      cursor: pointer; text-decoration: none; transition: background 0.2s;
    }
    .btn-nav:hover { background: rgba(255,255,255,0.20); }

    main {
      position: relative; z-index: 1; flex: 1;
      display: flex; align-items: center; justify-content: center;
    }

    /* CARD */
    .card {
      width: 100%; max-width: 340px;
      background: rgba(255,255,255,0.11);
      backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 26px;
      padding: 46px 38px 38px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.22);
    }
    .card-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #22c55e, #86efac);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; margin: 0 auto 20px;
      box-shadow: 0 8px 24px rgba(34,197,94,0.35);
    }
    h1 {
      font-size: 1.9rem; font-weight: 700;
      color: #fff; text-align: center; margin-bottom: 8px;
    }
    .subtitle {
      text-align: center; font-size: 0.85rem;
      color: rgba(255,255,255,0.50); margin-bottom: 30px;
    }

    .flash-msg {
      border-radius: 10px; padding: 11px 14px;
      font-size: 0.84rem; margin-bottom: 16px; text-align: center;
    }
    .flash-danger { background: rgba(239,68,68,0.22); border: 1px solid rgba(239,68,68,0.4); color: #fca5a5; }
    .flash-success { background: rgba(34,197,94,0.20); border: 1px solid rgba(34,197,94,0.38); color: #86efac; }

    .field { margin-bottom: 14px; position: relative; }
    .field label { display: block; font-size: 0.82rem; color: rgba(255,255,255,0.62); margin-bottom: 6px; font-weight: 500; }
    input {
      width: 100%; padding: 13px 18px;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px; color: #fff;
      font-family: 'Outfit', sans-serif; font-size: 0.92rem;
      outline: none; transition: border-color 0.2s, background 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.32); }
    input:focus { border-color: #22c55e; background: rgba(34,197,94,0.10); }

    .eye-btn {
      position: absolute; right: 14px; top: 70%; transform: translateY(-50%);
      background: none; border: none; color: rgba(255,255,255,0.42);
      cursor: pointer; font-size: 1rem; padding: 2px;
    }

    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border: none; border-radius: 13px; color: #fff;
      font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700;
      cursor: pointer; margin-top: 6px; margin-bottom: 22px;
      box-shadow: 0 6px 20px rgba(34,197,94,0.38);
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-login:hover { opacity: 0.88; transform: translateY(-2px); }
    .btn-login:active { transform: translateY(0); }

    .bottom-link {
      text-align: center; font-size: 0.87rem; color: rgba(255,255,255,0.50);
    }
    .bottom-link a { color: #86efac; text-decoration: none; font-weight: 600; }
    .bottom-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="shape s1"></div>
  <div class="shape s2"></div>
  <div class="shape s3"></div>
  <div class="shape s4"></div>

  <nav class="navbar">
    <a href="/home" class="brand">
      <div class="brand-icon">🌿</div>
      SehatSathi AI
    </a>
    <a href="/register" class="btn-nav">Register</a>
  </nav>

  <main>
    <div class="card">
      <div class="card-icon">🌿</div>
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to your SehatSathi account</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}{% for cat, msg in messages %}
          <div class="flash-msg flash-{{ cat }}">{{ msg }}</div>
        {% endfor %}{% endif %}
      {% endwith %}

      <form method="POST" action="/login">
        <div class="field">
          <label>Username</label>
          <input type="text" name="username" placeholder="Enter your username" required autocomplete="username"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter your password" id="pwdField" required/>
          <button type="button" class="eye-btn" onclick="togglePwd()">👁</button>
        </div>
        <button type="submit" class="btn-login">Login</button>
      </form>
      <div class="bottom-link">Don't have an account? <a href="/register">Register here</a></div>
    </div>
  </main>

  <script>
    function togglePwd() {
      const f = document.getElementById('pwdField');
      f.type = f.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
